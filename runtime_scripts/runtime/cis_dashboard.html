// ── Intelligence Sidebar ───────────────────────────────────────────────────────
function IntelSidebar({ collapsed, onToggle, activePanel }) {
  const [activeTab, setActiveTab] = useState('local');

  React.useEffect(() => {
    if (activePanel === 'live') setActiveTab('live');
  }, [activePanel]);

  const [sessions,     setSessions]     = useState([]);
  const [activeId,     setActiveId]     = useState(null);
  const [yourMsg,      setYourMsg]      = useState('');
  const [consolidated, setConsolidated] = useState('');
  const [gemini,       setGemini]       = useState('');
  const [claude,       setClaude]       = useState('');
  const [chatgpt,      setChatgpt]      = useState('');
  const [showAttrib,   setShowAttrib]   = useState(false);
  const [syncing,      setSyncing]      = useState(false);
  const [syncStatus,   setSyncStatus]   = useState('');
  const [addingRound,  setAddingRound]  = useState(false);
  const [copiedUrl,    setCopiedUrl]    = useState(false);

  const LIVE_URL = 'https://creative-intelligence-system.com';

  const loadSessions = () => api.get('/api/live/sessions').then(setSessions);
  React.useEffect(() => { loadSessions(); }, []);

  const active = sessions.find(s => s.session.id === activeId);
  const roundNum = active ? active.rounds.length + 1 : 1;

  // pushQuestion: saves the current question as a partial round, then pushes to live site.
  // This lets models read the question before responses are pasted.
  const pushQuestion = async () => {
    if (!activeId || !yourMsg.trim()) {
      // No question typed — just push current state
      setSyncing(true); setSyncStatus('Pushing...');
      const r = await api.post('/api/live/push', {});
      setSyncStatus(r.synced ? '✓ Live site updated' : '✗ Push failed');
      setSyncing(false);
      setTimeout(() => setSyncStatus(''), 4000);
      return;
    }
    setSyncing(true); setSyncStatus('Saving question...');
    // Save partial round with question only
    await api.post(`/api/live/sessions/${activeId}/rounds`, {
      your_message: yourMsg, consolidated: '', gemini: '', claude: '', chatgpt: ''
    });
    await loadSessions();
    setSyncStatus('Pushing to live site...');
    const r = await api.post('/api/live/push', {});
    setSyncStatus(r.synced ? '✓ Question live — give models the URL' : '✗ Push failed');
    setSyncing(false);
    // Clear only the question — keep response fields for pasting
    setYourMsg('');
    setTimeout(() => setSyncStatus(''), 5000);
  };

  // pushResponses: saves responses to the latest round and pushes.
  const pushResponses = async () => {
    if (!activeId) return;
    // Find the most recent round that has a question but no responses yet
    const lastRound = active?.rounds?.[active.rounds.length - 1];
    const hasContent = consolidated.trim() || gemini.trim() || claude.trim() || chatgpt.trim();
    if (!hasContent) return;
    setAddingRound(true);
    setSyncStatus('Saving responses...');
    try {
      if (lastRound && lastRound.your_message && !lastRound.consolidated && !lastRound.gemini) {
        // Update the existing partial round with responses via a new round entry
        await api.post(`/api/live/sessions/${activeId}/rounds`, {
          your_message: '', consolidated, gemini, claude, chatgpt
        });
      } else {
        await api.post(`/api/live/sessions/${activeId}/rounds`, {
          your_message: yourMsg, consolidated, gemini, claude, chatgpt
        });
        setYourMsg('');
      }
      setConsolidated(''); setGemini(''); setClaude(''); setChatgpt('');
      setShowAttrib(false);
      await loadSessions();
      setSyncStatus('Pushing...');
      const r = await api.post('/api/live/push', {});
      setSyncStatus(r.synced ? '✓ Responses logged + pushed' : '✗ Push failed');
      setTimeout(() => setSyncStatus(''), 4000);
    } finally { setAddingRound(false); }
  };

  const push = async () => {
    setSyncing(true); setSyncStatus('Pushing...');
    const r = await api.post('/api/live/push', {});
    setSyncStatus(r.synced ? '✓ Live site updated' : '✗ Push failed');
    setSyncing(false);
    setTimeout(() => setSyncStatus(''), 4000);
  };

  const stepNum = (num, bg) => e('div', {
    style:{ width:20, height:20, borderRadius:'50%', flexShrink:0,
      background:bg, display:'flex', alignItems:'center', justifyContent:'center',
      fontSize:11, fontWeight:700, color: bg==='var(--accent-purple)'?'#fff':'#000' }
  }, num);

  const hint = txt => e('div', { style:{ fontFamily:'var(--mono)', fontSize:9,
    color:'var(--text-dim)', paddingLeft:28, marginTop:-4 } }, txt);

  const LOCAL_MODELS = [
    { name: 'Qwen2.5-VL 32B', role: 'Vision \u00b7 OCR \u00b7 Extract', badge: 'local',  load: 72, color: 'var(--accent-green)', active: true  },
    { name: 'Qwen2.5 7B',     role: 'Normalize \u00b7 Classify',         badge: 'local',  load: 15, color: 'var(--accent-green)', active: false },
  ];
  const REMOTE_MODELS = [
    { name: 'Claude Sonnet', role: 'Intelligence \u00b7 Review',   badge: 'remote', load: 40, color: 'var(--accent-cyan)', active: true  },
    { name: 'Gemini 2.0',   role: 'Multi-modal \u00b7 Synthesis', badge: 'remote', load: 0,  color: 'var(--accent-cyan)', active: false },
    { name: 'ChatGPT 4o',   role: 'Reasoning \u00b7 Live',        badge: 'remote', load: 0,  color: 'var(--accent-cyan)', active: false },
  ];
  const AGENTS = [
    { name: 'Librarian',  role: 'Knowledge retrieval', badge: 'idle', load: 0, color: 'var(--accent-purple)' },
    { name: 'Teacher',    role: 'Production guidance', badge: 'idle', load: 0, color: 'var(--accent-purple)' },
    { name: 'Researcher', role: 'Source analysis',     badge: 'idle', load: 0, color: 'var(--accent-purple)' },
  ];

  const ModelCard = ({ m }) =>
    e('div', { className: `model-card ${m.active ? 'active-model' : ''}` },
      e('div', { className: 'model-card-header' },
        e('div', { className: 'model-name' }, m.name),
        e('div', { className: `model-badge ${m.badge}` }, m.badge.toUpperCase())
      ),
      e('div', { className: 'model-role' }, m.role),
      m.load > 0 && e('div', { className: 'model-bar' },
        e('div', { className: 'model-bar-fill', style: { width: m.load + '%', background: m.color } })
      )
    );

  const models = activeTab === 'local' ? LOCAL_MODELS
               : activeTab === 'remote' ? REMOTE_MODELS
               : AGENTS;

  const renderLiveTab = () => {
    const taStyle = (color) => ({
      fontFamily:'var(--mono)', fontSize:11, lineHeight:1.5,
      background:'var(--bg-base)', border:'1px solid var(--border)',
      borderLeft:`3px solid ${color}`, borderRadius:6,
      color:'var(--text-primary)', padding:'5px 8px', resize:'none', width:'100%'
    });
    return e('div', { style:{ display:'flex', flexDirection:'column', gap:8, padding:'8px' } },
      e('div', null,
        e('div', { className:'intel-section-label' }, '\u25b8 Active Session'),
        e('select', {
          value: activeId || '',
          onChange: ev => setActiveId(Number(ev.target.value) || null),
          style:{ width:'100%', marginBottom:4 }
        },
          e('option', { value:'' }, '\u2014 select session \u2014'),
          sessions.map((item, idx) => {
            const s = item.session;
            const num = String(sessions.length - idx).padStart(3,'0');
            return e('option', { key:s.id, value:s.id }, `#${num} ${s.topic}`);
          })
        )
      ),
      !active
        ? e('div', { style:{ fontFamily:'var(--mono)', fontSize:10, color:'var(--text-dim)',
            textAlign:'center', padding:'16px 0' } }, 'Select a session above')
        : e('div', { style:{ display:'flex', flexDirection:'column', gap:8 } },
          e('div', { style:{ display:'flex', alignItems:'center', justifyContent:'space-between' } },
            e('div', { style:{ fontFamily:'var(--mono)', fontSize:9, letterSpacing:'0.1em',
              textTransform:'uppercase', color:'var(--text-dim)' } },
              `Round ${roundNum}`),
            e('button', { className:'btn btn-secondary', style:{ padding:'2px 6px', fontSize:9 },
              onClick:()=>setShowAttrib(s=>!s) },
              showAttrib ? '\u25be Combined' : '\u25b8 Per-model')
          ),
          e('div', { style:{ display:'flex', gap:6, alignItems:'flex-start' } },
            stepNum('1','var(--accent-blue)'),
            e('textarea', { value:yourMsg, onChange:ev=>setYourMsg(ev.target.value),
              placeholder:'Type your question...', rows:3,
              style: taStyle('var(--accent-blue)') })
          ),
          e('div', { style:{ display:'flex', gap:5, alignItems:'center' } },
            stepNum('2','var(--accent-amber)'),
            e('button', { className:'btn btn-amber',
              style:{ flex:1, padding:'6px', fontSize:10, fontWeight:600 },
              onClick:pushQuestion, disabled:syncing },
              syncing ? '\u27f3' : '\u2191 Save Question + Push'),
            e('button', { className:'btn btn-secondary',
              style:{ padding:'6px 8px', fontSize:10, whiteSpace:'nowrap' },
              onClick:()=>{ navigator.clipboard.writeText(LIVE_URL); setCopiedUrl(true);
                setTimeout(()=>setCopiedUrl(false),2000); } },
              copiedUrl ? '\u2713 Copied' : '\ud83d\udd17 Copy URL')
          ),
          syncStatus && e('div', { style:{ fontFamily:'var(--mono)', fontSize:9, paddingLeft:26,
            color: syncStatus.startsWith('\u2713')?'var(--accent-green)':'var(--accent-red)' } }, syncStatus),
          hint('Saves question to DB + pushes. Give models the URL — they read your question.'),
          e('div', { style:{ display:'flex', gap:6, alignItems:'flex-start' } },
            stepNum('3','var(--accent-purple)'),
            e('div', { style:{ flex:1 } },
              !showAttrib
                ? e('textarea', { value:consolidated, onChange:ev=>setConsolidated(ev.target.value),
                    placeholder:'Paste all responses here...', rows:5,
                    style: taStyle('var(--accent-purple)') })
                : e('div', { style:{ display:'flex', flexDirection:'column', gap:5 } },
                    ...[
                      ['Gemini',  gemini,  setGemini,  'var(--accent-amber)'],
                      ['Claude',  claude,  setClaude,  'var(--accent-purple)'],
                      ['ChatGPT', chatgpt, setChatgpt, 'var(--accent-green)'],
                    ].map(([label, val, fn, color]) =>
                      e('div', { key:label },
                        e('div', { style:{ fontFamily:'var(--mono)', fontSize:8,
                          letterSpacing:'0.1em', textTransform:'uppercase',
                          color:color, marginBottom:2 } }, label),
                        e('textarea', { value:val, onChange:ev=>fn(ev.target.value),
                          placeholder:`${label}...`, rows:2,
                          style:{ ...taStyle(color), borderLeft:'none', borderTop:`2px solid ${color}` } })
                      )
                    )
                  )
            )
          ),
          e('div', { style:{ display:'flex', gap:5, alignItems:'center' } },
            stepNum('4','var(--accent-green)'),
            e('button', { className:'btn btn-success',
              style:{ flex:1, padding:'6px', fontSize:10, fontWeight:600 },
              onClick: async () => { await pushResponses(); },
              disabled: addingRound || (!consolidated.trim()
                && !gemini.trim() && !claude.trim() && !chatgpt.trim()) },
              addingRound ? '\u27f3' : `\u2713 Log Responses + Push`)
          ),
          hint('Saves + pushes. Models see the full updated thread.')
        )
    );
  };

  return e('div', { className: `intel-sidebar ${collapsed ? 'collapsed' : ''}` },
    e('div', { className: 'intel-header' },
      !collapsed && e('div', { className: 'intel-header-label' }, 'Intelligence'),
      e('button', { className: 'intel-toggle', onClick: onToggle }, collapsed ? '\u25c0' : '\u25b6')
    ),
    !collapsed && e('div', { key:'tabs', className:'intel-tabs' },
      ['local','remote','agent','live'].map(t =>
        e('button', { key:t,
          className: `intel-tab ${activeTab===t?'active':''}`,
          onClick: () => setActiveTab(t) },
          t === 'live' ? '\u26a1' : t.toUpperCase()
        )
      )
    ),
    !collapsed && activeTab !== 'live' && e('div', { key:'body', className:'intel-body' },
      e('div', { className:'intel-section-label' }, activeTab==='agent' ? '\u25b8 Agents' : '\u25b8 Models'),
      models.map((m,i) => e(ModelCard, { key:i, m }))
    ),
    !collapsed && activeTab === 'live' && e('div', { key:'live', style:{ flex:1, overflowY:'auto' } },
      renderLiveTab()
    )
  );
}

function ProjectWorkspace({ projectId, panel, navigate }) {
  const [activePanel, setActivePanel] = useState(panel || 'overview');
  const [project, setProject]         = useState(null);
  const [showCapture, setShowCapture] = useState(false);
  const [sysStatus, setSysStatus]     = useState(null);
  const [intelCollapsed, setIntelCollapsed] = useState(false);
  const [deckCollapsed,  setDeckCollapsed]  = useState(false);

  useEffect(() => {
    api.get(`/api/projects/${projectId}`).then(setProject);
    api.get('/api/status').then(setSysStatus);
    const iv = setInterval(() => api.get('/api/status').then(setSysStatus), 30000);
    return () => clearInterval(iv);
  }, [projectId]);

  const goPanel = p => {
    setActivePanel(p);
    navigate(`/project/${projectId}/${p}`);
  };

  const renderPanel = () => {
    switch(activePanel) {
      case 'overview':  return e(OverviewPanel,  { projectId });
      case 'session':   return e(SessionPanel,   { projectId });
      case 'tasks':     return e(TasksPanel,     { projectId });
      case 'pipeline':  return e(PipelinePanel,  { projectId });
      case 'knowledge': return e(KnowledgePanel, { projectId });
      case 'insights':   return e(InsightsPanel,   { projectId });
      case 'decisions':  return e(DecisionsPanel, { projectId });
      case 'live':        return e(LivePanel,      { projectId });
      default: return null;
    }
  };

  return e('div', { style:{display:'flex', flexDirection:'column', height:'100vh'} },

    e('div', { className:'topbar' },
      e('div', { className:'topbar-logo', onClick:()=>navigate('/') }, 'CIS'),
      e('span', { className:'topbar-sep' }, '/'),
      e('div', { className:'topbar-breadcrumb' }, project?.title || projectId),
      e('div', { className:'topbar-status' },
        e('div', { className:'status-dot' }),
        'ONLINE'
      ),
      e('div', { className:'topbar-right' },
        sysStatus && [
          e('span', { key:'r', className:'topbar-count' }, e('strong',null,sysStatus.counts.records), ' records'),
          e('span', { key:'t', className:'topbar-count' }, e('strong',null,sysStatus.counts.open_tasks), ' tasks'),
        ],
        e('button', { className:'capture-btn', onClick:()=>setShowCapture(true) }, '⚡ Capture')
      )
    ),

    e('div', { className:'layout' },
      e(StreamDeck, {
        activePanel,
        goPanel,
        collapsed: deckCollapsed,
        onToggle: () => setDeckCollapsed(s => !s)
      }),
      e('div', { className:'main' },
        e('div', { className:'panel-header' },
          e('div', { className:'panel-title' },
            e('span', { className:'panel-title-accent' }, 'CIS'),
            ' / ' + (PANELS.find(p=>p.key===activePanel)?.label || activePanel)
          )
        ),
        e('div', { className:'panel-body' }, renderPanel())
      ),
      e(IntelSidebar, {
        collapsed: intelCollapsed,
        onToggle: () => setIntelCollapsed(s => !s),
        activePanel
      })
    ),

    showCapture && e(CapturePanel, { projectId, onClose:()=>setShowCapture(false) })
  );
}

// ── App Root ───────────────────────────────────────────────────────────────────
function App() {
  const route = useRoute();

  if (route.projectId) {
    return e(ProjectWorkspace, {
      projectId: route.projectId,
      panel: route.panel,
      navigate: route.navigate
    });
  }

  return e('div', { style:{display:'flex', flexDirection:'column', height:'100vh'} },
    e('div', { className:'topbar' },
      e('div', { className:'topbar-logo' }, 'CIS'),
      e('span', { className:'topbar-sep' }, '—'),
      e('div', { className:'topbar-breadcrumb' }, 'Creative Intelligence System'),
      e('div', { className:'topbar-status' },
        e('div', { className:'status-dot' }),
        'ONLINE'
      )
    ),
    e(Launcher, { navigate: route.navigate })
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(e(App));
</script>
</body>
</html>
