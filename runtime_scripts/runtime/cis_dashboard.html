<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CIS — Creative Intelligence System</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Barlow:wght@300;400;500;600&family=Barlow+Condensed:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg-base:       #09090c;
    --bg-surface:    #101218;
    --bg-raised:     #161a24;
    --bg-panel:      #1a1f2e;
    --border:        #242b3a;
    --border-bright: #354060;
    --accent-blue:   #4a9eff;
    --accent-green:  #3dffa0;
    --accent-amber:  #ffb830;
    --accent-red:    #ff4a6a;
    --accent-purple: #a855f7;
    --accent-cyan:   #22d3ee;
    --text-primary:  #e8eaf2;
    --text-secondary:#8892a8;
    --text-dim:      #404860;
    --mono:          'Share Tech Mono', monospace;
    --sans:          'Barlow', sans-serif;
    --condensed:     'Barlow Condensed', sans-serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg-base);
    color: var(--text-primary);
    font-family: var(--sans);
    height: 100vh;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }

  /* ── Scrollbar ── */
  ::-webkit-scrollbar { width: 4px; height: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  /* ── Top Bar ── */
  .topbar {
    height: 48px;
    background: var(--bg-surface);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    padding: 0 20px;
    gap: 16px;
    flex-shrink: 0;
    z-index: 100;
  }

  .topbar-logo {
    font-family: var(--condensed);
    font-weight: 800;
    font-size: 16px;
    letter-spacing: 0.25em;
    color: var(--accent-blue);
    text-transform: uppercase;
    cursor: pointer;
  }

  .topbar-logo:hover { color: #6ab4ff; }

  .topbar-sep {
    color: var(--text-dim);
    font-family: var(--mono);
    font-size: 14px;
  }

  .topbar-breadcrumb {
    font-family: var(--condensed);
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 0.1em;
    color: var(--text-secondary);
    text-transform: uppercase;
  }

  .topbar-status {
    display: flex;
    align-items: center;
    gap: 6px;
    font-family: var(--mono);
    font-size: 10px;
    color: var(--text-secondary);
  }

  .status-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--accent-green);
    box-shadow: 0 0 6px var(--accent-green);
    animation: pulse 2s infinite;
  }

  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.35} }

  .topbar-right {
    margin-left: auto;
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .topbar-count {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--text-dim);
  }

  .topbar-count strong {
    color: var(--accent-blue);
    font-size: 12px;
  }

  /* ── Capture Button (always visible) ── */
  .capture-btn {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 6px 14px;
    background: transparent;
    border: 1px solid var(--accent-amber);
    border-radius: 5px;
    color: var(--accent-amber);
    font-family: var(--condensed);
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.15s;
  }

  .capture-btn:hover {
    background: rgba(255,184,48,0.1);
    box-shadow: 0 0 14px rgba(255,184,48,0.25);
  }

  /* ── Layout ── */
  .layout {
    display: flex;
    flex: 1;
    overflow: hidden;
  }

  /* ── Sidebar ── */
  .sidebar {
    width: 58px;
    background: var(--bg-surface);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 10px 0;
    gap: 2px;
    flex-shrink: 0;
  }

  .nav-btn {
    width: 46px; height: 46px;
    border-radius: 8px;
    border: 1px solid transparent;
    background: transparent;
    cursor: pointer;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 3px;
    transition: all 0.15s;
  }

  .nav-btn:hover { background: var(--bg-raised); border-color: var(--border); }

  .nav-btn.active {
    background: var(--bg-panel);
    border-color: var(--accent-blue);
    box-shadow: 0 0 14px rgba(74,158,255,0.12);
  }

  .nav-icon { font-size: 17px; line-height: 1; }
  .nav-label {
    font-family: var(--condensed);
    font-size: 8px; font-weight: 700;
    letter-spacing: 0.06em;
    color: var(--text-dim);
    text-transform: uppercase;
  }

  .nav-btn.active .nav-label { color: var(--accent-blue); }

  .sidebar-div {
    width: 30px; height: 1px;
    background: var(--border);
    margin: 4px 0;
  }

  /* ── Main ── */
  .main {
    flex: 1;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }

  .panel-header {
    height: 38px;
    background: var(--bg-surface);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    padding: 0 18px;
    gap: 10px;
    flex-shrink: 0;
  }

  .panel-title {
    font-family: var(--condensed);
    font-weight: 700;
    font-size: 12px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--text-secondary);
  }

  .panel-title-accent { color: var(--accent-blue); }

  .panel-body {
    flex: 1;
    overflow-y: auto;
    padding: 18px;
  }

  /* ── Cards ── */
  .card {
    background: var(--bg-surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 14px 16px;
    margin-bottom: 12px;
  }

  .card-title {
    font-family: var(--condensed);
    font-weight: 700;
    font-size: 11px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--text-dim);
    margin-bottom: 12px;
  }

  /* ── Inputs ── */
  input[type="text"], textarea, select {
    background: var(--bg-base);
    border: 1px solid var(--border);
    border-radius: 5px;
    color: var(--text-primary);
    font-family: var(--mono);
    font-size: 12px;
    padding: 7px 10px;
    outline: none;
    transition: border-color 0.15s;
    width: 100%;
  }

  input[type="text"]:focus, textarea:focus, select:focus {
    border-color: var(--accent-blue);
  }

  select option { background: var(--bg-raised); }
  textarea { resize: vertical; min-height: 64px; }

  .field-row { display: flex; gap: 8px; margin-bottom: 8px; }

  /* ── Buttons ── */
  .btn {
    font-family: var(--condensed);
    font-weight: 700;
    font-size: 11px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    padding: 7px 14px;
    border-radius: 5px;
    border: 1px solid transparent;
    cursor: pointer;
    transition: all 0.15s;
    white-space: nowrap;
    display: inline-flex;
    align-items: center;
    gap: 5px;
  }

  .btn:disabled { opacity: 0.35; cursor: not-allowed; }

  .btn-primary { background: var(--accent-blue); color: #000; border-color: var(--accent-blue); }
  .btn-primary:hover:not(:disabled) { background: #6ab4ff; box-shadow: 0 0 14px rgba(74,158,255,0.3); }

  .btn-secondary { background: transparent; color: var(--text-secondary); border-color: var(--border); }
  .btn-secondary:hover:not(:disabled) { background: var(--bg-raised); border-color: var(--border-bright); color: var(--text-primary); }

  .btn-success { background: transparent; color: var(--accent-green); border-color: var(--accent-green); }
  .btn-success:hover:not(:disabled) { background: rgba(61,255,160,0.08); box-shadow: 0 0 12px rgba(61,255,160,0.2); }

  .btn-amber { background: transparent; color: var(--accent-amber); border-color: var(--accent-amber); }
  .btn-amber:hover:not(:disabled) { background: rgba(255,184,48,0.08); }

  .btn-danger { background: transparent; color: var(--accent-red); border-color: var(--accent-red); }
  .btn-danger:hover:not(:disabled) { background: rgba(255,74,106,0.08); }

  /* ── Badge ── */
  .badge {
    font-family: var(--mono);
    font-size: 9px;
    padding: 2px 7px;
    border-radius: 3px;
    border: 1px solid;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    white-space: nowrap;
  }

  .badge-draft    { color: var(--accent-amber);  border-color: var(--accent-amber);  background: rgba(255,184,48,0.08); }
  .badge-checked  { color: var(--accent-blue);   border-color: var(--accent-blue);   background: rgba(74,158,255,0.08); }
  .badge-approved { color: var(--accent-green);  border-color: var(--accent-green);  background: rgba(61,255,160,0.08); }
  .badge-locked   { color: var(--accent-purple); border-color: var(--accent-purple); background: rgba(168,85,247,0.08); }
  .badge-active   { color: var(--accent-green);  border-color: var(--accent-green);  background: rgba(61,255,160,0.08); }
  .badge-open     { color: var(--accent-amber);  border-color: var(--accent-amber);  background: rgba(255,184,48,0.08); }
  .badge-complete { color: var(--accent-green);  border-color: var(--accent-green);  background: rgba(61,255,160,0.08); }
  .badge-web      { color: var(--accent-cyan);   border-color: var(--accent-cyan);   background: rgba(34,211,238,0.08); }
  .badge-word     { color: #a3e635;              border-color: #a3e635;              background: rgba(163,230,53,0.08); }
  .badge-image    { color: var(--accent-purple); border-color: var(--accent-purple); background: rgba(168,85,247,0.08); }
  .badge-action   { color: var(--accent-amber);  border-color: var(--accent-amber);  background: rgba(255,184,48,0.08); }
  .badge-sound    { color: var(--accent-red);    border-color: var(--accent-red);    background: rgba(255,74,106,0.08); }

  /* ── Grid ── */
  .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; }

  /* ── Stat ── */
  .stat-block {
    background: var(--bg-surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 14px 16px;
  }

  .stat-value {
    font-family: var(--condensed);
    font-size: 30px; font-weight: 800;
    color: var(--accent-blue);
    line-height: 1;
  }

  .stat-label {
    font-family: var(--condensed);
    font-size: 10px; font-weight: 700;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--text-dim);
    margin-top: 4px;
  }

  /* ── WIAS Progress ── */
  .wias-grid {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 8px;
    margin-bottom: 12px;
  }

  .wias-stage {
    background: var(--bg-base);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 10px 8px;
    text-align: center;
    transition: all 0.2s;
  }

  .wias-stage.active { border-color: var(--accent-blue); background: var(--bg-panel); }
  .wias-stage.complete { border-color: var(--accent-green); background: rgba(61,255,160,0.04); }

  .wias-letter {
    font-family: var(--condensed);
    font-size: 22px; font-weight: 800;
    color: var(--text-dim);
    line-height: 1;
  }

  .wias-stage.active .wias-letter { color: var(--accent-blue); }
  .wias-stage.complete .wias-letter { color: var(--accent-green); }

  .wias-name {
    font-family: var(--condensed);
    font-size: 9px; font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--text-dim);
    margin-top: 2px;
  }

  .wias-stage.active .wias-name { color: var(--accent-blue); }
  .wias-stage.complete .wias-name { color: var(--accent-green); }

  .wias-pips {
    display: flex;
    justify-content: center;
    gap: 2px;
    margin-top: 6px;
  }

  .pip {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--border);
    transition: background 0.2s;
  }

  .pip.on { background: var(--accent-blue); box-shadow: 0 0 4px var(--accent-blue); }
  .wias-stage.complete .pip.on { background: var(--accent-green); box-shadow: 0 0 4px var(--accent-green); }

  /* ── Project Launcher ── */
  .launcher {
    flex: 1;
    overflow-y: auto;
    padding: 32px;
  }

  .launcher-header {
    margin-bottom: 28px;
  }

  .launcher-title {
    font-family: var(--condensed);
    font-size: 11px; font-weight: 700;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--text-dim);
    margin-bottom: 6px;
  }

  .launcher-heading {
    font-family: var(--condensed);
    font-size: 28px; font-weight: 800;
    letter-spacing: 0.05em;
    color: var(--text-primary);
  }

  .project-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 16px;
    margin-bottom: 20px;
  }

  .project-card {
    background: var(--bg-surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 20px;
    cursor: pointer;
    transition: all 0.2s;
    position: relative;
    overflow: hidden;
  }

  .project-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, var(--accent-blue), var(--accent-purple));
    opacity: 0;
    transition: opacity 0.2s;
  }

  .project-card:hover {
    border-color: var(--border-bright);
    background: var(--bg-raised);
    transform: translateY(-2px);
    box-shadow: 0 8px 32px rgba(0,0,0,0.4);
  }

  .project-card:hover::before { opacity: 1; }

  .project-card-type {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--text-dim);
    text-transform: uppercase;
    margin-bottom: 8px;
  }

  .project-card-title {
    font-family: var(--condensed);
    font-size: 18px; font-weight: 700;
    color: var(--text-primary);
    margin-bottom: 8px;
    line-height: 1.2;
  }

  .project-card-concept {
    font-size: 12px;
    color: var(--text-secondary);
    line-height: 1.5;
    margin-bottom: 14px;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }

  .project-card-footer {
    display: flex;
    align-items: center;
    gap: 6px;
    flex-wrap: wrap;
  }

  .project-card-meta {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--text-dim);
    margin-left: auto;
  }

  .new-project-card {
    background: transparent;
    border: 1px dashed var(--border);
    border-radius: 10px;
    padding: 20px;
    cursor: pointer;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 8px;
    min-height: 140px;
    transition: all 0.2s;
    color: var(--text-dim);
  }

  .new-project-card:hover {
    border-color: var(--accent-blue);
    color: var(--accent-blue);
    background: rgba(74,158,255,0.04);
  }

  .new-project-icon { font-size: 28px; }
  .new-project-label {
    font-family: var(--condensed);
    font-size: 12px; font-weight: 700;
    letter-spacing: 0.12em;
    text-transform: uppercase;
  }

  /* ── New Project Modal ── */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.7);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 1000;
    backdrop-filter: blur(4px);
  }

  .modal {
    background: var(--bg-surface);
    border: 1px solid var(--border-bright);
    border-radius: 12px;
    padding: 28px;
    width: 480px;
    max-width: 90vw;
    box-shadow: 0 24px 64px rgba(0,0,0,0.6);
  }

  .modal-title {
    font-family: var(--condensed);
    font-size: 16px; font-weight: 800;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--text-primary);
    margin-bottom: 20px;
  }

  .modal-field { margin-bottom: 12px; }

  .modal-label {
    font-family: var(--condensed);
    font-size: 10px; font-weight: 700;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--text-dim);
    margin-bottom: 4px;
  }

  .modal-footer {
    display: flex;
    gap: 8px;
    justify-content: flex-end;
    margin-top: 20px;
  }

  /* ── Capture Modal ── */
  .capture-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.5);
    display: flex;
    align-items: flex-start;
    justify-content: flex-end;
    padding: 56px 16px 0 0;
    z-index: 900;
  }

  .capture-panel {
    background: var(--bg-surface);
    border: 1px solid var(--accent-amber);
    border-radius: 10px;
    padding: 20px;
    width: 360px;
    box-shadow: 0 16px 48px rgba(0,0,0,0.5), 0 0 24px rgba(255,184,48,0.1);
  }

  .capture-title {
    font-family: var(--condensed);
    font-size: 13px; font-weight: 800;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--accent-amber);
    margin-bottom: 14px;
  }

  /* ── Row items ── */
  .row-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 9px 11px;
    border: 1px solid var(--border);
    border-radius: 6px;
    margin-bottom: 5px;
    background: var(--bg-surface);
    transition: all 0.12s;
  }

  .row-item:hover { border-color: var(--border-bright); background: var(--bg-raised); }
  .row-item.selected { border-color: var(--accent-blue); background: var(--bg-panel); }

  .row-title { flex: 1; font-size: 13px; color: var(--text-primary); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .row-sub { font-family: var(--mono); font-size: 10px; color: var(--text-dim); }

  /* ── Pipeline steps ── */
  .pipeline-track {
    display: flex;
    align-items: center;
    gap: 0;
    margin: 12px 0;
  }

  .p-step { flex: 1; }

  .step-btn {
    width: 100%;
    padding: 9px 4px;
    background: var(--bg-base);
    border: 1px solid var(--border);
    border-radius: 6px;
    cursor: pointer;
    transition: all 0.15s;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 3px;
    color: var(--text-dim);
  }

  .step-btn:hover:not(:disabled) { border-color: var(--accent-blue); background: var(--bg-raised); }
  .step-btn.done { border-color: var(--accent-green); background: rgba(61,255,160,0.04); color: var(--accent-green); }
  .step-btn.running { border-color: var(--accent-amber); color: var(--accent-amber); animation: stepglow 1.2s infinite; }
  .step-btn:disabled { opacity: 0.4; cursor: not-allowed; }

  @keyframes stepglow {
    0%,100% { box-shadow: 0 0 6px rgba(255,184,48,0.2); }
    50% { box-shadow: 0 0 18px rgba(255,184,48,0.5); }
  }

  .step-icon { font-size: 16px; line-height: 1; }
  .step-label { font-family: var(--condensed); font-size: 9px; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; }

  .p-arrow { width: 18px; text-align: center; color: var(--text-dim); font-size: 11px; flex-shrink: 0; }

  /* ── Output log ── */
  .output-log {
    background: var(--bg-base);
    border: 1px solid var(--border);
    border-radius: 5px;
    padding: 9px 11px;
    font-family: var(--mono);
    font-size: 11px;
    color: var(--accent-green);
    min-height: 50px;
    max-height: 110px;
    overflow-y: auto;
    white-space: pre-wrap;
    word-break: break-all;
    margin-top: 8px;
  }

  .output-log.err { color: var(--accent-red); }

  /* ── Task list ── */
  .task-row {
    display: flex;
    align-items: flex-start;
    gap: 10px;
    padding: 10px 12px;
    border: 1px solid var(--border);
    border-radius: 6px;
    margin-bottom: 6px;
    background: var(--bg-surface);
    transition: border-color 0.12s;
  }

  .task-row.complete { opacity: 0.4; }
  .task-row.priority-1 { border-left: 3px solid var(--accent-red); }
  .task-row.priority-2 { border-left: 3px solid var(--accent-amber); }
  .task-row.priority-3 { border-left: 3px solid var(--accent-blue); }

  .task-check {
    width: 16px; height: 16px;
    border: 1px solid var(--border-bright);
    border-radius: 3px;
    background: transparent;
    cursor: pointer;
    flex-shrink: 0;
    margin-top: 1px;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.12s;
    color: var(--accent-green);
    font-size: 11px;
  }

  .task-check:hover { border-color: var(--accent-green); background: rgba(61,255,160,0.08); }

  .task-body { flex: 1; min-width: 0; }
  .task-title { font-size: 13px; color: var(--text-primary); margin-bottom: 2px; }
  .task-desc { font-size: 11px; color: var(--text-secondary); line-height: 1.4; }
  .task-phase { font-family: var(--mono); font-size: 10px; color: var(--text-dim); margin-top: 4px; }

  /* ── Session ── */
  .session-output {
    background: var(--bg-base);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 12px;
    font-family: var(--mono);
    font-size: 11px;
    color: var(--text-secondary);
    line-height: 1.6;
    white-space: pre-wrap;
    max-height: 240px;
    overflow-y: auto;
    margin-top: 10px;
  }

  /* ── Insights ── */
  .insight-row {
    padding: 10px 12px;
    border: 1px solid var(--border);
    border-left: 3px solid var(--accent-blue);
    border-radius: 6px;
    margin-bottom: 6px;

  }

  .insight-row.architectural { border-left-color: var(--accent-purple); }
  .insight-row.extraction    { border-left-color: var(--accent-amber); }
  .insight-row.workflow      { border-left-color: var(--accent-green); }
  .insight-row.system        { border-left-color: var(--accent-cyan); }

  .insight-cat {
    font-family: var(--condensed);
    font-size: 9px; font-weight: 700;

    text-transform: uppercase;

  .insight-title-text { font-size: 13px; font-weight: 500; color: var(--text-primary); margin: 2px 0; }
  .insight-obs { font-size: 12px; color: var(--text-secondary); line-height: 1.5; }
  .insight-time { font-family: var(--mono); font-size: 10px; color: var(--text-dim); margin-top: 4px; }

  /* ── Loading / Empty ── */
  .loading { display: flex; align-items: center; gap: 8px; color: var(--text-dim); font-family: var(--mono); font-size: 11px; padding: 20px 0; }
  .spinner { width: 13px; height: 13px; border: 2px solid var(--border); border-top-color: var(--accent-blue); border-radius: 50%; animation: spin 0.7s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .empty { text-align: center; padding: 32px 20px; color: var(--text-dim); font-family: var(--mono); font-size: 11px; }

</head>
<body>
<div id="root"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script>
const { useState, useEffect, useCallback, useRef } = React;
const e = React.createElement;

// ── API ────────────────────────────────────────────────────────────────────────
const api = {
  get:  url => fetch(url).then(r => r.json()),
  post: (url, data) => fetch(url, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(data)
  }).then(r => r.json())
};

// ── Routing ────────────────────────────────────────────────────────────────────
function useRoute() {
  const [path, setPath] = useState(window.location.pathname);
  useEffect(() => {
    const handler = () => setPath(window.location.pathname);
    window.addEventListener('popstate', handler);
    return () => window.removeEventListener('popstate', handler);
  }, []);
  const navigate = useCallback(to => {
    window.history.pushState({}, '', to);
    setPath(to);
  }, []);
  const parts = path.split('/').filter(Boolean);
  return {
    path,
    navigate,
    isLauncher: parts.length === 0,
    projectId: parts[0] === 'project' ? parts[1] : null,
    panel: parts[0] === 'project' ? (parts[2] || 'overview') : null
  };
}

// ── Badge ──────────────────────────────────────────────────────────────────────
function Badge({ status }) {
  return e('span', { className: `badge badge-${status}` }, status);
}

// ── WIAS Progress ──────────────────────────────────────────────────────────────
const WIAS = [
  { key: 'word',   letter: 'W', name: 'Word' },
  { key: 'image',  letter: 'I', name: 'Image' },
  { key: 'action', letter: 'A', name: 'Action' },
  { key: 'sound',  letter: 'S', name: 'Sound' },
  { key: 'web',    letter: 'W', name: 'Web' },
];

function WiasProgress({ progress }) {
  return e('div', { className: 'wias-grid' },
    WIAS.map(({ key, letter, name }) => {
      const depth = progress?.[key] || 0;
      const cls = `wias-stage ${depth >= 4 ? 'complete' : depth > 0 ? 'active' : ''}`;
      return e('div', { key, className: cls },
        e('div', { className: 'wias-letter' }, letter),
        e('div', { className: 'wias-name' }, name),
        e('div', { className: 'wias-pips' },
          [0,1,2,3].map(i => e('div', { key: i, className: `pip ${depth > i ? 'on' : ''}` }))
        )
      );
    })
  );
}

// ── Capture Flyout ─────────────────────────────────────────────────────────────
function CapturePanel({ projectId, onClose }) {
  const [type, setType]  = useState('insight');
  const [title, setTitle] = useState('');
  const [obs, setObs]    = useState('');
  const [saving, setSaving] = useState(false);
  const [msg, setMsg]    = useState('');

  const save = async () => {
    if (!title.trim() || !obs.trim()) return;
    setSaving(true);
    const result = await api.post('/api/captures', {
      capture_type: type, title, observation: obs,
      project_id: projectId || null
    });
    if (result.success) {
      setMsg('Captured.'); setTitle(''); setObs('');
      setTimeout(() => { setMsg(''); onClose(); }, 800);
    } else {
      setMsg('Failed: ' + (result.error || 'unknown'));
    }
    setSaving(false);
  };

  return e('div', { className: 'capture-overlay', onClick: onClose },
    e('div', { className: 'capture-panel', onClick: ev => ev.stopPropagation() },
      e('div', { className: 'capture-title' }, '⚡ Quick Capture'),
      e('div', { className: 'field-row' },
        e('select', { value: type, onChange: ev => setType(ev.target.value), style: { maxWidth: 140 } },
          ['insight','observation','correction','decision'].map(t =>
            e('option', { key: t, value: t }, t)
          )
        )
      ),
      e('div', { className: 'field-row' },
        e('input', { type: 'text', placeholder: 'Title', value: title, onChange: ev => setTitle(ev.target.value) })
      ),
      e('textarea', { placeholder: 'What did you notice or discover?', value: obs, onChange: ev => setObs(ev.target.value) }),
      e('div', { style: { display:'flex', gap:8, marginTop:10, alignItems:'center' } },
        e('button', { className:'btn btn-amber', onClick:save, disabled: saving||!title.trim()||!obs.trim() },
          saving ? '⟳' : '+ Capture'
        ),
        e('button', { className:'btn btn-secondary', onClick:onClose }, 'Cancel'),
        msg && e('span', { style:{ fontFamily:'var(--mono)', fontSize:11, color:'var(--accent-green)' } }, msg)
      )
    )
  );
}

// ── New Project Modal ──────────────────────────────────────────────────────────
function NewProjectModal({ onClose, onCreated }) {
  const [title, setTitle]   = useState('');
  const [concept, setConcept] = useState('');
  const [output, setOutput] = useState('');
  const [scope, setScope]   = useState('minor');
  const [ptype, setPtype]   = useState('creative');
  const [stages, setStages] = useState(['word']);
  const [saving, setSaving] = useState(false);

  const toggleStage = s => setStages(prev =>
    prev.includes(s) ? prev.filter(x => x !== s) : [...prev, s]
  );

  const create = async () => {
    if (!title.trim()) return;
    setSaving(true);
    const result = await api.post('/api/projects', {
      title, concept, intended_output_type: output,
      project_scope: scope, project_type: ptype, active_stages: stages
    });
    if (result.success) { onCreated(result.project_id); }
    setSaving(false);
  };

  return e('div', { className: 'modal-overlay', onClick: onClose },
    e('div', { className: 'modal', onClick: ev => ev.stopPropagation() },
      e('div', { className: 'modal-title' }, 'New Project'),
      e('div', { className: 'modal-field' },
        e('div', { className: 'modal-label' }, 'Title'),
        e('input', { type:'text', placeholder:'Project title', value:title, onChange: ev=>setTitle(ev.target.value) })
      ),
      e('div', { className: 'modal-field' },
        e('div', { className: 'modal-label' }, 'Concept'),
        e('textarea', { placeholder:'What is this project?', value:concept, onChange: ev=>setConcept(ev.target.value) })
      ),
      e('div', { className: 'modal-field' },
        e('div', { className: 'modal-label' }, 'Intended Output'),
        e('input', { type:'text', placeholder:'e.g. short film, web app, comic series', value:output, onChange: ev=>setOutput(ev.target.value) })
      ),
      e('div', { className: 'field-row' },
        e('div', { className: 'modal-field', style:{flex:1} },
          e('div', { className: 'modal-label' }, 'Type'),
          e('select', { value:ptype, onChange: ev=>setPtype(ev.target.value) },
            ['creative','application','research'].map(t => e('option',{key:t,value:t},t))
          )
        ),
        e('div', { className: 'modal-field', style:{flex:1} },
          e('div', { className: 'modal-label' }, 'Scope'),
          e('select', { value:scope, onChange: ev=>setScope(ev.target.value) },
            ['minor','major'].map(s => e('option',{key:s,value:s},s))
          )
        )
      ),
      e('div', { className: 'modal-field' },
        e('div', { className: 'modal-label' }, 'Active WIAS Stages'),
        e('div', { style:{ display:'flex', gap:6, flexWrap:'wrap', marginTop:4 } },
          ['word','image','action','sound','web'].map(s =>
            e('button', {
              key: s,
              className: `btn ${stages.includes(s) ? 'btn-primary' : 'btn-secondary'}`,
              style:{ padding:'4px 10px', fontSize:10 },
              onClick: () => toggleStage(s)
            }, s)
          )
        )
      ),
      e('div', { className: 'modal-footer' },
        e('button', { className:'btn btn-secondary', onClick:onClose }, 'Cancel'),
        e('button', { className:'btn btn-primary', onClick:create, disabled:saving||!title.trim() },
          saving ? '⟳ Creating...' : 'Create Project'
        )
      )
    )
  );
}

// ── Project Launcher ───────────────────────────────────────────────────────────
function Launcher({ navigate }) {
  const [projects, setProjects] = useState([]);
  const [loading, setLoading]   = useState(true);
  const [showNew, setShowNew]   = useState(false);

  const load = () => {
    setLoading(true);
    api.get('/api/projects').then(p => { setProjects(p); setLoading(false); });
  };

  useEffect(() => { load(); }, []);

  return e('div', { className: 'launcher' },
    e('div', { className: 'launcher-header' },
      e('div', { className: 'launcher-title' }, 'Creative Intelligence System'),
      e('div', { className: 'launcher-heading' }, 'Select a Project')
    ),
    loading
      ? e('div', { className: 'loading' }, e('div', { className:'spinner' }), 'Loading projects...')
      : e('div', { className: 'project-grid' },
          ...projects.map(p =>
            e('div', {
              key: p.project_id,
              className: 'project-card',
              onClick: () => navigate(`/project/${p.project_id}`)
            },
              e('div', { className: 'project-card-type' }, p.project_type || 'project'),
              e('div', { className: 'project-card-title' }, p.title),
              p.concept && e('div', { className: 'project-card-concept' }, p.concept),
              e('div', { className: 'project-card-footer' },
                ...(p.active_stages || []).map(s => e(Badge, { key:s, status:s })),
                e('span', { className: 'project-card-meta' },
                  `${p._record_count || 0} records`
                )
              )
            )
          ),
          e('div', { className: 'new-project-card', onClick: () => setShowNew(true) },
            e('div', { className: 'new-project-icon' }, '+'),
            e('div', { className: 'new-project-label' }, 'New Project')
          )
        ),
    showNew && e(NewProjectModal, {
      onClose: () => setShowNew(false),
      onCreated: id => { setShowNew(false); navigate(`/project/${id}`); }
    })
  );
}

// ── Overview Panel ─────────────────────────────────────────────────────────────
function OverviewPanel({ projectId }) {
  const [project, setProject] = useState(null);
  const [records, setRecords] = useState([]);
  const [decisions, setDecisions] = useState([]);

  useEffect(() => {
    api.get(`/api/projects/${projectId}`).then(setProject);
    api.get(`/api/records?project_id=${projectId}`).then(setRecords);
    api.get('/api/decisions').then(setDecisions);
  }, [projectId]);

  if (!project) return e('div', { className:'loading' }, e('div',{className:'spinner'}), 'Loading...');

  const progress = project._wias_progress || {};

  return e('div', null,
    e('div', { className:'grid-3', style:{marginBottom:12} },
      e('div', { className:'stat-block' },
        e('div', { className:'stat-value' }, records.length),
        e('div', { className:'stat-label' }, 'Records')
      ),
      e('div', { className:'stat-block' },
        e('div', { className:'stat-value' }, decisions.length),
        e('div', { className:'stat-label' }, 'Decisions')
      ),
      e('div', { className:'stat-block' },
        e('div', { className:'stat-value' }, (project.production_phases||[]).filter(p=>p.status==='complete').length),
        e('div', { className:'stat-label' }, 'Phases Done')
      )
    ),

    e('div', { className:'card' },
      e('div', { className:'card-title' }, 'WIAS Stage Progress'),
      e(WiasProgress, { progress })
    ),

    project.concept && e('div', { className:'card' },
      e('div', { className:'card-title' }, 'Concept'),
      e('div', { style:{ fontSize:13, color:'var(--text-secondary)', lineHeight:1.6 } }, project.concept)
    ),

    (project.production_phases||[]).length > 0 && e('div', { className:'card' },
      e('div', { className:'card-title' }, 'Build Phases'),
      (project.production_phases||[]).map(ph =>
        e('div', { key:ph.phase_id, className:'row-item' },
          e('div', { className:'row-title' }, ph.label),
          e(Badge, { status: ph.status==='complete' ? 'complete' : ph.status==='active' ? 'active' : 'draft' })
        )
      )
    )
  );
}

// ── Session Panel ──────────────────────────────────────────────────────────────
function SessionPanel({ projectId }) {
  const [startOutput, setStartOutput] = useState('');
  const [starting, setStarting]       = useState(false);
  const [focus, setFocus]             = useState('');
  const [completed, setCompleted]     = useState('');
  const [nextSteps, setNextSteps]     = useState('');
  const [notes, setNotes]             = useState('');
  const [closing, setClosing]         = useState(false);
  const [closeResult, setCloseResult] = useState(null);
  const [recent, setRecent]           = useState([]);

  useEffect(() => {
    api.get('/api/session/recent').then(setRecent);
  }, []);

  const startSession = async () => {
    setStarting(true);
    setStartOutput('Starting session...');
    const result = await api.post('/api/session/start', {});
    setStartOutput(result.stdout || result.stderr || 'Done.');
    setStarting(false);
  };

  const closeSession = async () => {
    if (!focus || !completed || !nextSteps) return;
    setClosing(true);
    const result = await api.post('/api/session/close', { focus, completed, next_steps: nextSteps, notes });
    setCloseResult(result);
    setClosing(false);
    api.get('/api/session/recent').then(setRecent);
  };

  return e('div', null,
    e('div', { className:'card' },
      e('div', { className:'card-title' }, 'Session Start'),
      e('button', { className:'btn btn-success', onClick:startSession, disabled:starting },
        starting ? '⟳ Starting...' : '▶ Run cis-start'
      ),
      startOutput && e('div', { className:'session-output' }, startOutput)
    ),

    e('div', { className:'card' },
      e('div', { className:'card-title' }, 'Session Close'),
      e('div', { className:'field-row' },
        e('input', { type:'text', placeholder:'Session focus', value:focus, onChange:ev=>setFocus(ev.target.value) })
      ),
      e('div', { className:'field-row' },
        e('textarea', { placeholder:'What was completed this session?', value:completed, onChange:ev=>setCompleted(ev.target.value), style:{minHeight:56} })
      ),
      e('div', { className:'field-row' },
        e('textarea', { placeholder:'Next steps for the next session', value:nextSteps, onChange:ev=>setNextSteps(ev.target.value), style:{minHeight:56} })
      ),
      e('div', { className:'field-row' },
        e('input', { type:'text', placeholder:'Notes (optional)', value:notes, onChange:ev=>setNotes(ev.target.value) })
      ),
      e('button', {
        className:'btn btn-primary',
        onClick:closeSession,
        disabled: closing || !focus || !completed || !nextSteps
      }, closing ? '⟳ Closing...' : '✓ Close Session + Commit'),
      closeResult && e('div', { className:`output-log ${closeResult.git?.success ? '' : 'err'}`, style:{marginTop:8} },
        closeResult.git?.success ? '✓ Committed and pushed.\n\n' + (closeResult.handoff_content||'') : closeResult.git?.stderr || 'Error'
      )
    ),

    recent.length > 0 && e('div', { className:'card' },
      e('div', { className:'card-title' }, 'Recent Sessions'),
      recent.map((s,i) =>
        e('div', { key:i, className:'row-item', style:{flexDirection:'column', alignItems:'flex-start', gap:3} },
          e('div', { style:{display:'flex', gap:8, width:'100%', alignItems:'center'} },
            e('div', { className:'row-title' }, s.focus),
            e('div', { className:'row-sub' }, s.session_date)
          ),
          e('div', { style:{fontSize:11, color:'var(--text-dim)'} }, s.next_steps)
        )
      )
    )
  );
}

// ── Tasks Panel ────────────────────────────────────────────────────────────────
function TasksPanel({ projectId }) {
  const [tasks, setTasks]     = useState([]);
  const [title, setTitle]     = useState('');
  const [desc, setDesc]       = useState('');
  const [cmd, setCmd]         = useState('');
  const [phase, setPhase]     = useState('');
  const [priority, setPriority] = useState('3');
  const [running, setRunning] = useState(null);
  const [log, setLog]         = useState('');
  const [logErr, setLogErr]   = useState(false);
  const [showAdd, setShowAdd] = useState(false);

  const load = () => api.get(`/api/tasks?project_id=${projectId}`).then(setTasks);
  useEffect(() => { load(); }, [projectId]);

  const addTask = async () => {
    if (!title.trim()) return;
    await api.post('/api/tasks', { title, description:desc, command:cmd||undefined, phase:phase||undefined, project_id:projectId, priority:parseInt(priority) });
    setTitle(''); setDesc(''); setCmd(''); setPhase(''); setPriority('3');
    setShowAdd(false);
    load();
  };

  const complete = async id => {
    await api.post(`/api/tasks/${id}/complete`, {});
    load();
  };

  const runTask = async task => {
    setRunning(task.id);
    setLog(`Running: ${task.command}`);
    setLogErr(false);
    const result = await api.post(`/api/tasks/${task.id}/run`, {});
    setLog(result.stdout || result.stderr || 'Done.');
    setLogErr(!result.success);
    setRunning(null);
    load();
  };

  const open   = tasks.filter(t => t.status === 'open');
  const done   = tasks.filter(t => t.status === 'complete');

  return e('div', null,
    e('div', { className:'card' },
      e('div', { style:{display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:12} },
        e('div', { className:'card-title', style:{margin:0} }, `${open.length} Open Tasks`),
        e('button', { className:'btn btn-secondary', style:{padding:'4px 10px'}, onClick:()=>setShowAdd(!showAdd) },
          showAdd ? '− Cancel' : '+ Add Task'
        )
      ),

      showAdd && e('div', { style:{marginBottom:14, padding:12, background:'var(--bg-base)', borderRadius:6, border:'1px solid var(--border)'} },
        e('div', { className:'field-row' },
          e('input', { type:'text', placeholder:'Task title', value:title, onChange:ev=>setTitle(ev.target.value) })
        ),
        e('div', { className:'field-row' },
          e('textarea', { placeholder:'Description (optional)', value:desc, onChange:ev=>setDesc(ev.target.value), style:{minHeight:48} })
        ),
        e('div', { className:'field-row' },
          e('input', { type:'text', placeholder:'Command (optional)', value:cmd, onChange:ev=>setCmd(ev.target.value) }),
          e('input', { type:'text', placeholder:'Phase', value:phase, onChange:ev=>setPhase(ev.target.value), style:{maxWidth:100} }),
          e('select', { value:priority, onChange:ev=>setPriority(ev.target.value), style:{maxWidth:80} },
            [['1','High'],['2','Med'],['3','Low']].map(([v,l]) => e('option',{key:v,value:v},l))
          )
        ),
        e('button', { className:'btn btn-primary', onClick:addTask, disabled:!title.trim() }, '+ Add')
      ),

      open.length === 0
        ? e('div', { className:'empty' }, 'No open tasks')
        : open.map(t =>
            e('div', { key:t.id, className:`task-row priority-${t.priority}` },
              e('div', { className:'task-check', onClick:()=>complete(t.id) }, ''),
              e('div', { className:'task-body' },
                e('div', { className:'task-title' }, t.title),
                t.description && e('div', { className:'task-desc' }, t.description),
                t.phase && e('div', { className:'task-phase' }, `Phase: ${t.phase}`)
              ),
              t.command && e('button', {
                className:'btn btn-secondary',
                style:{padding:'3px 9px', fontSize:10},
                disabled: running === t.id,
                onClick: () => runTask(t)
              }, running === t.id ? '⟳' : '▶ Run')
            )
          ),

      log && e('div', { className:`output-log ${logErr?'err':''}` }, log)
    ),

    done.length > 0 && e('div', { className:'card' },
      e('div', { className:'card-title' }, `${done.length} Completed`),
      done.slice(0,5).map(t =>
        e('div', { key:t.id, className:'task-row complete' },
          e('div', { className:'task-check' }, '✓'),
          e('div', { className:'task-body' },
            e('div', { className:'task-title' }, t.title)
          )
        )
      )
    )
  );
}

// ── Pipeline Panel ─────────────────────────────────────────────────────────────
const STEPS = [
  { key:'classify',   label:'Classify',   icon:'◈' },
  { key:'preprocess', label:'Preprocess', icon:'⬡' },
  { key:'extract',    label:'Extract',    icon:'◉' },
  { key:'normalize',  label:'Normalize',  icon:'◎' },
];

const STATUS_ORDER = ['arrived','classified','preprocessed','extracted','draft','normalized','checked','approved','locked'];

function PipelinePanel({ projectId }) {
  const [sourceId, setSourceId] = useState('');
  const [manifest, setManifest] = useState(null);
  const [filePath, setFilePath] = useState('');
  const [running, setRunning]   = useState(null);
  const [log, setLog]           = useState('');
  const [logErr, setLogErr]     = useState(false);

  const fetchManifest = async id => {
    if (!id.trim()) return;
    const r = await api.get(`/api/pipeline/status/${id.trim()}`);
    setManifest(r.found ? r : null);
  };

  const runStep = async step => {
    if (!sourceId.trim()) return;
    setRunning(step); setLog(`Running ${step}...`); setLogErr(false);
    const r = await api.post(`/api/pipeline/${step}`, { source_id: sourceId.trim() });
    setLog(r.success ? (r.stdout||`${step} complete.`) : (r.stderr||`${step} failed.`));
    setLogErr(!r.success);
    setRunning(null);
    await fetchManifest(sourceId);
  };

  const runIntake = async () => {
    if (!filePath.trim()) return;
    setRunning('intake'); setLog('Running intake...'); setLogErr(false);
    const r = await api.post('/api/intake', { path: filePath.trim() });
    setLog(r.success ? (r.stdout||'Intake complete.') : (r.stderr||'Intake failed.'));
    setLogErr(!r.success);
    setRunning(null);
  };

  const statusIdx = manifest ? STATUS_ORDER.indexOf(manifest.status) : -1;
  const stepDone  = step => {
    const stepIdxMap = { classify:1, preprocess:2, extract:3, normalize:4 };
    return statusIdx >= stepIdxMap[step];
  };

  return e('div', null,
    e('div', { className:'card' },
      e('div', { className:'card-title' }, 'Intake New Source'),
      e('div', { className:'field-row' },
        e('input', { type:'text', placeholder:'/mnt/archive/path/to/file.jpg', value:filePath, onChange:ev=>setFilePath(ev.target.value) }),
        e('button', { className:'btn btn-primary', disabled:running==='intake'||!filePath.trim(), onClick:runIntake, style:{minWidth:80} },
          running==='intake' ? '⟳' : '↓ Intake'
        )
      )
    ),

    e('div', { className:'card' },
      e('div', { className:'card-title' }, 'Pipeline'),
      e('div', { className:'field-row' },
        e('input', { type:'text', placeholder:'source_id e.g. image__weird_war_tales_cover__001', value:sourceId,
          onChange:ev=>setSourceId(ev.target.value), onBlur:()=>fetchManifest(sourceId) }),
        e('button', { className:'btn btn-secondary', onClick:()=>fetchManifest(sourceId), style:{minWidth:70} }, 'Check')
      ),
      manifest && e('div', { style:{display:'flex', gap:8, marginBottom:8, alignItems:'center'} },
        e('span', { style:{fontFamily:'var(--mono)', fontSize:11, color:'var(--text-dim)'} }, manifest.source_name||manifest.source_id),
        e(Badge, { status: manifest.status })
      ),
      e('div', { className:'pipeline-track' },
        STEPS.map((step,i) => [
          i > 0 && e('div', { key:`a${i}`, className:'p-arrow' }, '›'),
          e('div', { key:step.key, className:'p-step' },
            e('button', {
              className:`step-btn ${stepDone(step.key)?'done':''} ${running===step.key?'running':''}`,
              onClick:()=>runStep(step.key),
              disabled: !!running || !sourceId.trim()
            },
              e('span', { className:'step-icon' }, running===step.key?'⟳':stepDone(step.key)?'✓':step.icon),
              e('span', { className:'step-label' }, step.label)
            )
          )
        ]).flat().filter(Boolean)
      ),
      log && e('div', { className:`output-log ${logErr?'err':''}` }, log)
    )
  );
}

// ── Knowledge Panel ────────────────────────────────────────────────────────────
function KnowledgePanel({ projectId }) {
  const [records, setRecords]   = useState([]);
  const [selected, setSelected] = useState(null);
  const [filter, setFilter]     = useState('');
  const [loading, setLoading]   = useState(true);

  useEffect(() => {
    api.get(`/api/records?project_id=${projectId}`).then(r => { setRecords(r); setLoading(false); });
  }, [projectId]);

  const filtered = records.filter(r => !filter || r.status === filter);

  return e('div', null,
    e('div', { className:'card' },
      e('div', { style:{display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:10} },
        e('div', { className:'card-title', style:{margin:0} }, `${records.length} Records`),
        e('div', { style:{display:'flex', gap:4} },
          ['','draft','checked','approved','locked'].map(s =>
            e('button', { key:s, className:`btn ${filter===s?'btn-primary':'btn-secondary'}`, style:{padding:'3px 8px', fontSize:10}, onClick:()=>setFilter(s) },
              s || 'All'
            )
          )
        )
      ),
      loading
        ? e('div', { className:'loading' }, e('div',{className:'spinner'}), 'Loading...')
        : filtered.length === 0
          ? e('div', { className:'empty' }, 'No records')
          : filtered.map(r =>
              e('div', { key:r.record_id, className:`row-item ${selected?.record_id===r.record_id?'selected':''}`, onClick:()=>setSelected(selected?.record_id===r.record_id?null:r) },
                e('div', { className:'row-title' }, r.title||r.record_id),
                e('div', { className:'row-sub' }, r.knowledge_category),
                e(Badge, { status:r.status })
              )
            )
    ),
    selected && e('div', { className:'card' },
      e('div', { className:'card-title' }, 'Record Detail'),
      [
        ['ID', selected.record_id],
        ['Category', selected.knowledge_category],
        ['Status', selected.status],
        ['Stages', (selected.active_stages||[]).join(', ') || '—'],
        ['Created', selected.created_at?.slice(0,10)],
      ].map(([l,v]) =>
        e('div', { key:l, style:{marginBottom:8} },
          e('div', { style:{fontFamily:'var(--condensed)', fontSize:10, fontWeight:700, letterSpacing:'0.1em', textTransform:'uppercase', color:'var(--text-dim)', marginBottom:2} }, l),
          e('div', { style:{fontFamily:'var(--mono)', fontSize:12, color:'var(--text-secondary)'} }, v)
        )
      )
    )
  );
}

// ── Insights Panel ─────────────────────────────────────────────────────────────
function InsightsPanel({ projectId }) {
  const [insights, setInsights] = useState([]);
  const [cat, setCat]     = useState('architectural');
  const [title, setTitle] = useState('');
  const [obs, setObs]     = useState('');
  const [saving, setSaving] = useState(false);
  const [msg, setMsg]     = useState('');

  const load = () => api.get('/api/captures?project_id=' + projectId).then(setInsights);
  useEffect(() => { load(); }, [projectId]);

  const save = async () => {
    if (!title.trim()||!obs.trim()) return;
    setSaving(true);
    const r = await api.post('/api/captures', { capture_type:cat, title, observation:obs, project_id:projectId });
    if (r.success) { setTitle(''); setObs(''); setMsg('Saved.'); load(); }
    else setMsg('Error: ' + (r.error||'unknown'));
    setSaving(false);
    setTimeout(()=>setMsg(''), 3000);
  };

  return e('div', null,
    e('div', { className:'card' },
      e('div', { className:'card-title' }, 'Capture'),
      e('div', { className:'field-row' },
        e('select', { value:cat, onChange:ev=>setCat(ev.target.value), style:{maxWidth:150} },
          ['architectural','extraction','workflow','system','observation'].map(c => e('option',{key:c,value:c},c))
        ),
        e('input', { type:'text', placeholder:'Title', value:title, onChange:ev=>setTitle(ev.target.value) })
      ),
      e('textarea', { placeholder:'What did you discover?', value:obs, onChange:ev=>setObs(ev.target.value) }),
      e('div', { style:{display:'flex', gap:8, marginTop:8, alignItems:'center'} },
        e('button', { className:'btn btn-success', onClick:save, disabled:saving||!title.trim()||!obs.trim() },
          saving ? '⟳' : '+ Save'
        ),
        msg && e('span', { style:{fontFamily:'var(--mono)', fontSize:11, color:'var(--accent-green)'} }, msg)
      )
    ),
    insights.length > 0 && e('div', { className:'card' },
      e('div', { className:'card-title' }, `${insights.length} Captures`),
      insights.map(ins =>
        e('div', { key:ins.id, className:`insight-row ${ins.capture_type||''}` },
          e('div', { className:'insight-cat' }, ins.capture_type),
          e('div', { className:'insight-title-text' }, ins.title),
          e('div', { className:'insight-obs' }, ins.observation),
          e('div', { className:'insight-time' }, ins.created_at?.slice(0,16).replace('T',' '))
        )
      )
    )
  );
}

// ── Project Workspace ──────────────────────────────────────────────────────────
const PANELS = [
  { key:'overview',  icon:'⬡', label:'System' },
  { key:'session',   icon:'▷', label:'Session' },
  { key:'tasks',     icon:'☑', label:'Tasks' },
  { key:'pipeline',  icon:'▶', label:'Pipeline' },
  { key:'knowledge', icon:'◈', label:'Knowledge' },
  { key:'insights',  icon:'◎', label:'Insights' },
];

function ProjectWorkspace({ projectId, panel, navigate }) {
  const [activePanel, setActivePanel] = useState(panel || 'overview');
  const [project, setProject]         = useState(null);
  const [showCapture, setShowCapture] = useState(false);
  const [sysStatus, setSysStatus]     = useState(null);

  useEffect(() => {
    api.get(`/api/projects/${projectId}`).then(setProject);
    api.get('/api/status').then(setSysStatus);
    const iv = setInterval(() => api.get('/api/status').then(setSysStatus), 30000);
    return () => clearInterval(iv);
  }, [projectId]);

  const goPanel = p => {
    setActivePanel(p);
    navigate(`/project/${projectId}/${p}`);
  };

  const renderPanel = () => {
    switch(activePanel) {
      case 'overview':  return e(OverviewPanel,  { projectId });
      case 'session':   return e(SessionPanel,   { projectId });
      case 'tasks':     return e(TasksPanel,     { projectId });
      case 'pipeline':  return e(PipelinePanel,  { projectId });
      case 'knowledge': return e(KnowledgePanel, { projectId });
      case 'insights':  return e(InsightsPanel,  { projectId });
      default: return null;
    }
  };

  return e('div', { style:{display:'flex', flexDirection:'column', height:'100vh'} },

    e('div', { className:'topbar' },
      e('div', { className:'topbar-logo', onClick:()=>navigate('/') }, 'CIS'),
      e('span', { className:'topbar-sep' }, '/'),
      e('div', { className:'topbar-breadcrumb' }, project?.title || projectId),
      e('div', { className:'topbar-status' },
        e('div', { className:'status-dot' }),
        'ONLINE'
      ),
      e('div', { className:'topbar-right' },
        sysStatus && [
          e('span', { key:'r', className:'topbar-count' }, e('strong',null,sysStatus.counts.records), ' records'),
          e('span', { key:'t', className:'topbar-count' }, e('strong',null,sysStatus.counts.open_tasks), ' tasks'),
        ],
        e('button', { className:'capture-btn', onClick:()=>setShowCapture(true) }, '⚡ Capture')
      )
    ),

    e('div', { className:'layout' },
      e('div', { className:'sidebar' },
        PANELS.map((p,i) => [
          i === 3 && e('div', { key:'div', className:'sidebar-div' }),
          e('button', { key:p.key, className:`nav-btn ${activePanel===p.key?'active':''}`, onClick:()=>goPanel(p.key), title:p.label },
            e('span', { className:'nav-icon' }, p.icon),
            e('span', { className:'nav-label' }, p.label)
          )
        ]).flat().filter(Boolean)
      ),
      e('div', { className:'main' },
        e('div', { className:'panel-header' },
          e('div', { className:'panel-title' },
            e('span', { className:'panel-title-accent' }, 'CIS'),
            ' / ' + (PANELS.find(p=>p.key===activePanel)?.label || activePanel)
          )
        ),
        e('div', { className:'panel-body' }, renderPanel())
      )
    ),

    showCapture && e(CapturePanel, { projectId, onClose:()=>setShowCapture(false) })
  );
}

// ── App Root ───────────────────────────────────────────────────────────────────
function App() {
  const route = useRoute();

  if (route.projectId) {
    return e(ProjectWorkspace, {
      projectId: route.projectId,
      panel: route.panel,
      navigate: route.navigate
    });
  }

  return e('div', { style:{display:'flex', flexDirection:'column', height:'100vh'} },
    e('div', { className:'topbar' },
      e('div', { className:'topbar-logo' }, 'CIS'),
      e('span', { className:'topbar-sep' }, '—'),
      e('div', { className:'topbar-breadcrumb' }, 'Creative Intelligence System'),
      e('div', { className:'topbar-status' },
        e('div', { className:'status-dot' }),
        'ONLINE'
      )
    ),
    e(Launcher, { navigate: route.navigate })
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(e(App));
</script>
</body>
